name: Close stale proposed-solution issues

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Only report matching issues, do not close
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"
      open_days:
        description: Minimum issue age in days
        required: false
        default: "30"
      comment_idle_days:
        description: Minimum days since last comment
        required: false
        default: "30"
      allowed_repos:
        description: Comma-separated public repository names to process
        required: false
        default: "Koha,Koha-25x,Bugiton,Finna-kehitysehdotukset"

permissions:
  contents: read
  issues: write

jobs:
  close-stale-proposed-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check token availability
        id: token_check
        env:
          TOKEN: ${{ secrets.KOHASUOMI_PROJECT_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing secret KOHASUOMI_PROJECT_TOKEN for this repository; skipping run."
            {
              echo "## Close stale proposed-solution issues"
              echo
              echo "- Result: skipped"
              echo "- Reason: missing secret KOHASUOMI_PROJECT_TOKEN in this repository context"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when token is missing
        if: steps.token_check.outputs.has_token != 'true'
        run: echo "Skipping because KOHASUOMI_PROJECT_TOKEN is not available in this repository context."

      - name: Close stale issues from Tikettien seuranta project
        if: steps.token_check.outputs.has_token == 'true'
        uses: actions/github-script@v7
        env:
          ALLOWED_REPOS: ${{ vars.KOHASUOMI_ALLOWED_PUBLIC_REPOS }}
        with:
          github-token: ${{ secrets.KOHASUOMI_PROJECT_TOKEN }}
          script: |
            const org = "KohaSuomi";
            const projectTitle = "Tikettien seuranta";
            const wantedStatus = "Ratkaisu ehdotettu";
            const defaultAllowedRepos = [
              "Koha",
              "Koha-25x",
              "Bugiton",
              "Finna-kehitysehdotukset"
            ];

            const inputAllowedRepos = (core.getInput("allowed_repos") || "").trim();
            const envAllowedRepos = (process.env.ALLOWED_REPOS || "").trim();

            const parseRepoList = (value) => value
              .split(/[\n,]/)
              .map((s) => s.trim())
              .filter(Boolean);

            const allowedRepos = inputAllowedRepos
              ? parseRepoList(inputAllowedRepos)
              : (envAllowedRepos ? parseRepoList(envAllowedRepos) : defaultAllowedRepos);

            const allowedRepoSet = new Set(allowedRepos);

            const dryRun = (core.getInput("dry_run") || "false") === "true";
            const openDays = parseInt(core.getInput("open_days") || "30", 10);
            const commentIdleDays = parseInt(core.getInput("comment_idle_days") || "30", 10);

            if (!Number.isFinite(openDays) || !Number.isFinite(commentIdleDays)) {
              throw new Error("open_days and comment_idle_days must be numbers");
            }

            const now = new Date();
            const openCutoff = new Date(now.getTime() - openDays * 24 * 60 * 60 * 1000);
            const commentCutoff = new Date(now.getTime() - commentIdleDays * 24 * 60 * 60 * 1000);

            async function findProjectIdByTitle(organizationLogin, title) {
              const query = `
                query($login: String!, $q: String!) {
                  organization(login: $login) {
                    projectsV2(first: 100, query: $q) {
                      nodes {
                        id
                        title
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                login: organizationLogin,
                q: title
              });

              const nodes = result.organization?.projectsV2?.nodes || [];
              const project = nodes.find((p) => p.title === title);
              if (!project) {
                throw new Error(`Project "${title}" not found in organization ${organizationLogin}`);
              }

              return project.id;
            }

            async function getAllProjectItems(projectId) {
              const items = [];
              let hasNextPage = true;
              let after = null;

              while (hasNextPage) {
                const query = `
                  query($projectId: ID!, $after: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $after) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            fieldValues(first: 30) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2FieldCommon {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                            content {
                              ... on Issue {
                                number
                                title
                                state
                                url
                                createdAt
                                repository {
                                  name
                                  isPrivate
                                  owner {
                                    login
                                  }
                                }
                                comments(last: 1) {
                                  nodes {
                                    createdAt
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;

                const result = await github.graphql(query, { projectId, after });
                const page = result.node.items;
                items.push(...page.nodes);

                hasNextPage = page.pageInfo.hasNextPage;
                after = page.pageInfo.endCursor;
              }

              return items;
            }

            function isWantedStatus(item) {
              const values = item.fieldValues?.nodes || [];

              return values.some((value) => {
                const fieldName = (value.field?.name || "").trim().toLowerCase();
                const statusName = (value.name || "").trim();
                const isStatusField = fieldName === "status" || fieldName === "tila";
                return isStatusField && statusName === wantedStatus;
              });
            }

            const projectId = await findProjectIdByTitle(org, projectTitle);
            core.info(`Using project ${projectTitle} (${projectId})`);
            core.info(`Allowed repositories: ${allowedRepos.join(", ")}`);

            const items = await getAllProjectItems(projectId);
            core.info(`Fetched ${items.length} project items`);

            const candidates = [];

            for (const item of items) {
              const issue = item.content;
              if (!issue) {
                continue;
              }

              if (issue.state !== "OPEN") {
                continue;
              }

              if (issue.repository.isPrivate) {
                continue;
              }

              if (!allowedRepoSet.has(issue.repository.name)) {
                continue;
              }

              if (!isWantedStatus(item)) {
                continue;
              }

              const createdAt = new Date(issue.createdAt);
              if (createdAt > openCutoff) {
                continue;
              }

              const latestCommentAt = issue.comments?.nodes?.[0]?.createdAt
                ? new Date(issue.comments.nodes[0].createdAt)
                : null;

              if (latestCommentAt && latestCommentAt > commentCutoff) {
                continue;
              }

              candidates.push(issue);
            }

            core.info(`Matched ${candidates.length} issues for closing`);
            let closedCount = 0;
            let skippedInaccessibleCount = 0;
            let skippedConflictCount = 0;

            for (const issue of candidates) {
              const owner = issue.repository.owner.login;
              const repo = issue.repository.name;
              const issueNumber = issue.number;

              core.info(`Candidate: ${owner}/${repo}#${issueNumber} ${issue.url}`);

              if (dryRun) {
                continue;
              }

              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: [
                    "Suljetaan automaattisesti, koska tiketin tila on **Ratkaisu ehdotettu**",
                    `ja tiketti on ollut auki yli ${openDays} päivää ilman viimeaikaista kommentointia.`
                  ].join("\n\n")
                });

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: "closed"
                });
                closedCount += 1;
              } catch (error) {
                const status = error.status || error.response?.status;
                const msg = error.message || "Unknown error";

                if (status === 403 || status === 404) {
                  skippedInaccessibleCount += 1;
                  core.warning(`Skipping inaccessible issue ${owner}/${repo}#${issueNumber} (HTTP ${status}): ${msg}`);
                  continue;
                }

                if (status === 409 || status === 422) {
                  skippedConflictCount += 1;
                  core.warning(`Skipping conflicting issue ${owner}/${repo}#${issueNumber} (HTTP ${status}): ${msg}`);
                  continue;
                }

                throw new Error(`Unexpected error on ${owner}/${repo}#${issueNumber} (HTTP ${status || "n/a"}): ${msg}`);
              }
            }

            core.info(`Summary: closed=${closedCount}, skipped_inaccessible=${skippedInaccessibleCount}, skipped_conflict=${skippedConflictCount}`);

            await core.summary
              .addHeading("Close stale proposed-solution issues")
              .addRaw(`- Dry run: ${dryRun}\n`)
              .addRaw(`- Allowed repositories: ${allowedRepos.join(", ")}\n`)
              .addRaw(`- Project items fetched: ${items.length}\n`)
              .addRaw(`- Matched candidates: ${candidates.length}\n`)
              .addRaw(`- Closed: ${closedCount}\n`)
              .addRaw(`- Skipped inaccessible (403/404): ${skippedInaccessibleCount}\n`)
              .addRaw(`- Skipped conflict (409/422): ${skippedConflictCount}\n`)
              .write();
